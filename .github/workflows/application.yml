# .github/workflows/application.yml
name: 🐳 Application - Build & Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'spring-petclinic/**'          # ✅ CORRIGÉ : app → spring-petclinic
      - 'spring-petclinic/Dockerfile'  # ✅ CORRIGÉ
  pull_request:
    branches:
      - main
    paths:
      - 'spring-petclinic/**'          # ✅ CORRIGÉ
      - 'spring-petclinic/Dockerfile'  # ✅ CORRIGÉ

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: petclinic-prod/petclinic
  APP_PATH: spring-petclinic           # ✅ CORRIGÉ : app → spring-petclinic
  TF_ROOT: terraform/environments/dev  # ✅ CORRIGÉ : ajout de terraform/

jobs:
  build-and-security:
    name: 🔨 Build & Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: ${{ env.APP_PATH }}
        run: |
          if [ -f "pom.xml" ]; then
            mvn -B verify -DskipTests
          else
            echo "⚠️ Aucun pom.xml trouvé - Utilisation d'une image existante"
          fi

      - name: Run Trivy on Code
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: ${{ env.APP_PATH }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  build-and-push:
    name: 🐳 Build & Push Image to ECR
    runs-on: ubuntu-latest
    needs: build-and-security
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Docker image tag
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ACTIONS_ROLE_ARN }}  # ✅ CORRIGÉ : sans GITHUB_
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.vars.outputs.sha_short }}
        run: |
          docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG ./${{ env.APP_PATH }}
          docker tag $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest

      - name: Scan Docker image with Trivy
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.vars.outputs.sha_short }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          format: 'sarif'
          output: 'trivy-image.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.vars.outputs.sha_short }}
        run: |
          docker push --all-tags $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

  deploy-ecs:
    name: 🚀 Deploy to ECS Fargate
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ACTIONS_ROLE_ARN }}  # ✅ CORRIGÉ : sans GITHUB_
          aws-region: ${{ env.AWS_REGION }}

      - name: Get ECS Cluster from Terraform
        run: |
          cd ${{ env.TF_ROOT }}
          CLUSTER_NAME=$(terraform output -raw ecs_cluster_name 2>/dev/null || echo "petclinic-dev-cluster")
          SERVICE_NAME=$(terraform output -raw service_name 2>/dev/null || echo "petclinic-dev-service")
          echo "CLUSTER_NAME=$CLUSTER_NAME" >> $GITHUB_ENV
          echo "SERVICE_NAME=$SERVICE_NAME" >> $GITHUB_ENV

      - name: Force ECS Service Update
        run: |
          echo "🔄 Mise à jour du service ECS..."
          aws ecs update-service \
            --cluster ${{ env.CLUSTER_NAME }} \
            --service ${{ env.SERVICE_NAME }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          
          echo "⏳ Attente de la stabilisation..."
          aws ecs wait services-stable \
            --cluster ${{ env.CLUSTER_NAME }} \
            --services ${{ env.SERVICE_NAME }} \
            --region ${{ env.AWS_REGION }}
          
          echo "✅ Déploiement ECS terminé"

      - name: Smoke Test
        run: |
          cd ${{ env.TF_ROOT }}
          ALB_DNS=$(terraform output -raw alb_dns_name 2>/dev/null || echo "")
          
          if [ -z "$ALB_DNS" ]; then
            ALB_DNS=$(aws elbv2 describe-load-balancers \
              --names petclinic-dev-alb \
              --query 'LoadBalancers[0].DNSName' \
              --output text 2>/dev/null || echo "")
          fi
          
          if [ -z "$ALB_DNS" ]; then
            echo "❌ Impossible de trouver l'URL de l'ALB"
            exit 1
          fi
          
          echo "🌐 Test de l'application : https://$ALB_DNS"
          
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://$ALB_DNS/actuator/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Application déployée avec succès !"
              echo "URL: https://$ALB_DNS"
              exit 0
            fi
            echo "⏳ Attente du health check... ($i/30)"
            sleep 10
          done
          
          echo "❌ Smoke test échoué après 300 secondes"
          exit 1