# .github/workflows/bootstrap.yml
name: 1. 🚀 Bootstrap - Création du Backend Terraform

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'terraform/bootstrap/**'
      - 'terraform/iam-github-actions.tf'
      - '.github/workflows/bootstrap.yml'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: 049618906674
  TF_ROOT: terraform/bootstrap
  ROLE_NAME: petclinic-github-actions-role

jobs:
  # ============================================================
  # PHASE 1 : Création du rôle IAM (si inexistant)
  # ============================================================
  create-iam-role:
    name: 🔐 Création du rôle IAM (OIDC)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (avec clés)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install AWS CLI
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install --update
          aws --version

      - name: Vérifier et créer le fournisseur OIDC (si inexistant)
        run: |
          echo "🔍 Vérification du fournisseur OIDC..."
          
          OIDC_EXISTS=$(aws iam list-open-id-connect-providers --region ${{ env.AWS_REGION }} \
            --query "OpenIDConnectProviderList[?contains(Arn, 'token.actions.githubusercontent.com')]" \
            --output text)
          
          if [ -z "$OIDC_EXISTS" ]; then
            echo "📦 Création du fournisseur OIDC..."
            THUMBPRINT=$(openssl s_client -servername token.actions.githubusercontent.com -connect token.actions.githubusercontent.com:443 2>&1 | openssl x509 -fingerprint -noout | cut -d'=' -f2 | tr -d ':')
            
            aws iam create-open-id-connect-provider \
              --url https://token.actions.githubusercontent.com \
              --client-id-list sts.amazonaws.com \
              --thumbprint-list $THUMBPRINT \
              --region ${{ env.AWS_REGION }}
            
            echo "✅ Fournisseur OIDC créé"
          else
            echo "✅ Fournisseur OIDC existe déjà : $OIDC_EXISTS"
          fi

      - name: Créer le rôle IAM (si inexistant)
        run: |
          echo "🔍 Vérification du rôle IAM : ${{ env.ROLE_NAME }}"
          
          ROLE_EXISTS=$(aws iam get-role --role-name ${{ env.ROLE_NAME }} --region ${{ env.AWS_REGION }} 2>&1 || echo "NOT_FOUND")
          
          if echo "$ROLE_EXISTS" | grep -q "NOT_FOUND"; then
            echo "📦 Création du rôle IAM : ${{ env.ROLE_NAME }}..."
            
            cat > trust-policy.json << 'EOF'
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": {
                    "Federated": "arn:aws:iam::049618906674:oidc-provider/token.actions.githubusercontent.com"
                  },
                  "Action": "sts:AssumeRoleWithWebIdentity",
                  "Condition": {
                    "StringEquals": {
                      "token.actions.githubusercontent.com:aud": "sts.amazonaws.com"
                    },
                    "StringLike": {
                      "token.actions.githubusercontent.com:sub": "repo:dehi37/dehit_est_avec_un_environment:*"
                    }
                  }
                }
              ]
            }
            EOF
            
            cat trust-policy.json
            
            aws iam create-role \
              --role-name ${{ env.ROLE_NAME }} \
              --assume-role-policy-document file://trust-policy.json \
              --description "Rôle IAM pour GitHub Actions - PetClinic" \
              --region ${{ env.AWS_REGION }}
            
            echo "✅ Rôle IAM créé : ${{ env.ROLE_NAME }}"
            
            echo "📦 Attachement des politiques..."
            aws iam attach-role-policy \
              --role-name ${{ env.ROLE_NAME }} \
              --policy-arn arn:aws:iam::aws:policy/AdministratorAccess \
              --region ${{ env.AWS_REGION }}
            
            echo "⏳ Attente de la propagation IAM (30 secondes)..."
            sleep 30
            
            echo "✅ Politiques attachées"
          else
            echo "✅ Le rôle IAM existe déjà : ${{ env.ROLE_NAME }}"
          fi

      - name: Vérifier et valider le rôle IAM
        run: |
          echo "🔍 Vérification finale du rôle..."
          
          aws iam get-role --role-name ${{ env.ROLE_NAME }} --region ${{ env.AWS_REGION }}
          
          ROLE_ARN="arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.ROLE_NAME }}"
          echo "✅ Rôle IAM prêt : $ROLE_ARN"
          echo "ROLE_ARN=$ROLE_ARN" >> $GITHUB_ENV
          
          echo "🧪 Test de l'assomption du rôle..."
          aws sts assume-role --role-arn $ROLE_ARN --role-session-name test-session --region ${{ env.AWS_REGION }} --duration-seconds 900 > /dev/null 2>&1
          
          if [ $? -eq 0 ]; then
            echo "✅ Le rôle peut être assumé avec succès !"
          else
            echo "⚠️ Le rôle ne peut pas encore être assumé, mais on continue..."
          fi